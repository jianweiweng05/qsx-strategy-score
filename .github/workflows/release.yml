name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build
      - name: Test
        run: pytest -q
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qsx-score-free-${{ github.ref_name }}
          path: dist/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          python - "$version" <<'PY' > release-notes.md
          import re
          import sys
          from pathlib import Path

          version = re.escape(sys.argv[1])
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(rf"^## v{version}.*?(?=^## v|\Z)", text, re.M | re.S)
          if not match:
              raise SystemExit(f"No CHANGELOG section found for v{sys.argv[1]}")
          print(match.group(0))
          PY
          gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file release-notes.md
